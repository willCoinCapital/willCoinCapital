<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>willCoin Capital Login</title>
<style>
    body {
        background: #0b0f1a;
        font-family: Arial, sans-serif;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-box {
        background: #111827;
        padding: 40px;
        border-radius: 12px;
        width: 300px;
        text-align: center;
        position: relative; /* This makes the logout button stay in the corner */
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    /* THE LOGOUT BUTTON */
    .logout-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        color: #19d3ff;
        text-decoration: none;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    h2 {
        margin-top: 10px;
        font-size: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 6px;
        background: #1f2937;
        color: white;
        box-sizing: border-box; /* Prevents input from stretching the box */
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #19d3ff;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        color: #0b0f1a;
        cursor: pointer;
    }

    a {
        color: #19d3ff;
        text-decoration: none;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="login-box">
    <a href="index.html" class="logout-btn">Logout</a>

    <h2>willCoin Capital</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p style="margin-top:15px;">
        Don't have an account?  
        <a href="signup.html">Sign up</a>
    </p>
</div>

<script src="auth.js"></script>

</body>
</html>
