<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>willCoin Capital Login</title>
<style>
    body {
        background: #000;
        font-family: 'Plus Jakarta Sans', Arial, sans-serif;
        color: white;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start; /* Changed from center to allow scrolling */
        min-height: 100vh;
        overflow-y: auto; /* Ensures you can scroll if the content is long */
    }

    .main-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        width: 100%;
        max-width: 360px;
    }

    /* BRAND HEADER */
    .brand-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .brand-header h1 {
        font-size: 24px;
        font-weight: 900;
        margin: 0;
        letter-spacing: -1px;
        text-transform: uppercase;
    }

    .brand-header h1 span { color: #19d3ff; }
    .brand-header p {
        font-size: 10px;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 5px;
    }

    /* HOW IT WORKS SECTION */
    .how-it-works {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 40px;
        animation: fadeInUp 0.8s ease-out;
    }

    .step-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 18px;
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .icon-box {
        width: 44px;
        height: 44px;
        background: rgba(25, 211, 255, 0.1);
        border: 1px solid rgba(25, 211, 255, 0.2);
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #19d3ff;
        font-size: 20px;
    }

    .step-text h4 {
        margin: 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #19d3ff;
    }

    .step-text p {
        margin: 4px 0 0 0;
        font-size: 12px;
        color: #9ca3af;
        line-height: 1.4;
    }

    /* LOGIN BOX */
    .login-box {
        background: #111827;
        padding: 35px;
        border-radius: 32px;
        width: 100%;
        box-sizing: border-box;
        text-align: center;
        position: relative;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.05);
    }

    input {
        width: 100%;
        padding: 18px;
        margin-top: 15px;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 14px;
        background: #000;
        color: white;
        box-sizing: border-box;
        font-size: 14px;
        outline: none;
    }

    input:focus { border-color: #19d3ff; }

    button {
        width: 100%;
        padding: 18px;
        margin-top: 25px;
        background: #19d3ff;
        border: none;
        border-radius: 14px;
        font-weight: 800;
        text-transform: uppercase;
        color: #000;
        cursor: pointer;
        letter-spacing: 1px;
    }

    .footer-link {
        margin-top: 25px;
        font-size: 13px;
        color: #6b7280;
    }

    .footer-link a {
        color: #19d3ff;
        text-decoration: none;
        font-weight: bold;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .pulse { animation: pulse-glow 2s infinite; }
    @keyframes pulse-glow {
        0% { box-shadow: 0 0 0 0 rgba(25, 211, 255, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(25, 211, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(25, 211, 255, 0); }
    }
</style>
</head>
<body>

<div class="main-container">
    <div class="brand-header">
        <h1>WILLCOIN<span>CAPITAL</span></h1>
        <p>Secure Member Access</p>
    </div>

    <div class="how-it-works">
        <div class="step-card">
            <div class="icon-box">₿</div>
            <div class="step-text">
                <h4>01. Deposit</h4>
                <p>Fund your secure wallet via BTC.</p>
            </div>
        </div>

        <div class="step-card">
            <div class="icon-box">⚙️</div>
            <div class="step-text">
                <h4>02. Stake</h4>
                <p>Choose your cycle via the slider.</p>
            </div>
        </div>

        <div class="step-card pulse" style="border-color: rgba(25, 211, 255, 0.3);">
            <div class="icon-box">🚀</div>
            <div class="step-text">
                <h4>03. Yield</h4>
                <p>Receive 50% profit in 7 days.</p>
            </div>
        </div>
    </div>

    <div class="login-box">
        <input type="text" id="username" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login to Dashboard</button>

        <p class="footer-link">
            New to WillCoin? <a href="signup.html">Create Account</a>
        </p>
    </div>
</div>

<script src="auth.js"></script>

</body>
</html>
