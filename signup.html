<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin Capital | Join Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-[#0a0a0a] border-2 border-[#1a1a1a] p-8 rounded-[2rem] shadow-[10px_10px_0px_#111]">
        <h1 class="text-3xl font-black italic tracking-tighter mb-2 text-center text-cyan-400">WILLCOIN CAPITAL</h1>
        <p class="text-gray-500 text-sm mb-8 text-center font-medium">Create your account for instant access.</p>

        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email Address" 
                class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:border-cyan-400 outline-none text-white">
            
            <input type="password" id="password" placeholder="Password" 
                class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:border-cyan-400 outline-none text-white">

            <button onclick="instantSignUp()" id="submit-btn"
                class="w-full bg-cyan-400 text-black font-black uppercase py-4 rounded-xl hover:scale-[0.98] transition-transform">
                Initialize & Enter
            </button>
        </div>
        <p id="msg" class="mt-6 text-xs text-center font-bold uppercase tracking-widest min-h-[20px]"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.appspot.com",
            messagingSenderId: "24156602",
            appId: "1:241566024834:web:7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        async function instantSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusMsg = document.getElementById('msg');
            const btn = document.getElementById('submit-btn');

            if(!email || !password) {
                statusMsg.innerText = "Error: Fields cannot be empty";
                statusMsg.style.color = "red";
                return;
            }

            statusMsg.innerText = "AUTHENTICATING...";
            statusMsg.style.color = "#22d3ee";
            btn.disabled = true;

            try {
                // 1. Create the user
                await auth.createUserWithEmailAndPassword(email, password);
                
                // 2. Success message
                statusMsg.innerText = "ACCESS GRANTED. REDIRECTING...";
                statusMsg.style.color = "#22c55e";

                // 3. IMMEDIATELY take them to the dashboard
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);

            } catch (error) {
                statusMsg.innerText = "SYSTEM ERROR: " + error.message.toUpperCase();
                statusMsg.style.color = "#ef4444";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
