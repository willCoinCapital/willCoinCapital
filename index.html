<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WillCoin Capital | Live Market Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-yellow: #f5d448;
            --dark-btn: #0f1111;
            --glass-card: rgba(15, 17, 17, 0.95);
            --white-glass: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--brand-yellow); font-family: 'Inter', sans-serif; color: #1a1a1a; }

        /* --- Navbar --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 6%; }
        .logo { font-family: 'Archivo Black', sans-serif; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .nav-links a { text-decoration: none; color: #1a1a1a; margin: 0 12px; font-weight: 500; font-size: 0.9rem; }
        .nav-auth .login-btn { background: #000; color: #fff; padding: 8px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; margin-right: 10px;}
        .nav-auth .signup-btn { background: #fff; border: 1px solid #ddd; padding: 8px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* --- Hero --- */
        .hero { display: flex; flex-wrap: wrap; padding: 60px 6% 100px; align-items: center; gap: 40px; }
        .hero-content { flex: 1.2; min-width: 320px; }
        .hero-content h1 { font-family: 'Archivo Black', sans-serif; font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.1; margin: 25px 0; letter-spacing: -2px; }
        .get-started { background: #000; color: #fff; padding: 18px 35px; border-radius: 30px; border: none; font-weight: 800; cursor: pointer; }

        /* --- Live Pulse Indicator --- */
        .live-dot { height: 8px; width: 8px; background-color: #4ade80; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #4ade80; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- Hero Glass Card --- */
        .hero-visual { flex: 0.8; min-width: 350px; }
        .main-glass { background: var(--glass-card); color: white; padding: 30px; border-radius: 32px; box-shadow: 0 40px 80px rgba(0,0,0,0.2); }
        .chart-frame { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; background: white; margin-top: 15px; }

        /* --- Market Overview --- */
        .markets { padding: 40px 6%; }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .coin-card { background: var(--white-glass); backdrop-filter: blur(10px); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.3); }
        .price { font-size: 1.8rem; font-weight: 800; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .change { font-weight: 700; font-size: 0.8rem; }
        .up { color: #1b8a5a; }
        .down { color: #e11d48; }

        /* --- Featured Portfolios --- */
        .featured { padding: 80px 6%; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .p-card { border-radius: 30px; padding: 40px 30px; min-height: 250px; display: flex; flex-direction: column; justify-content: flex-end; }
        .p-card.yellow { background: linear-gradient(135deg, #f9e17c, #f5d448); }
        .p-card.blue { background: linear-gradient(135deg, #a5b4fc, #818cf8); color: white; }
        .p-card h3 { font-family: 'Archivo Black', sans-serif; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🏢 WILLCOIN CAPITAL</div>
        <div class="nav-links">
            <a href="#">Home</a><a href="#">Markets</a><a href="#">Invest</a>
        </div>
        <div class="nav-auth">
            <button class="signup-btn">Sign Up</button>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Unlock Your Crypto Potential.</h1>
            <p>Institutional-grade portfolio management with live global market analytics.</p>
            <button class="get-started">GET STARTED</button>
        </div>

        <div class="hero-visual">
            <div class="main-glass">
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem;">
                    <span><span class="live-dot"></span> LIVE BITCOIN CHART</span>
                    <span style="opacity:0.6;">USD</span>
                </div>
                <div class="chart-frame">
                    <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_76d4d&symbol=BITSTAMP%3ABTCUSD&interval=D&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=%5B%5D&theme=light&style=1&timezone=Etc%2FUTC&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=en" width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </section>

    <section class="markets">
        <h2 style="font-family:'Archivo Black'; margin-bottom:20px;">Market Overview</h2>
        <div class="market-grid">
            <div class="coin-card" id="btc-card">
                <div style="display:flex; justify-content:space-between;">
                    <b>Bitcoin (BTC)</b>
                    <span class="change" id="btc-change">Loading...</span>
                </div>
                <div class="price" id="btc-price">$0.00</div>
            </div>

            <div class="coin-card" id="eth-card">
                <div style="display:flex; justify-content:space-between;">
                    <b>Ethereum (ETH)</b>
                    <span class="change" id="eth-change">Loading...</span>
                </div>
                <div class="price" id="eth-price">$0.00</div>
            </div>

            <div class="coin-card">
                <div style="display:flex; justify-content:space-between;">
                    <b>WillCoin (WC)</b>
                    <span class="change up">+24.0%</span>
                </div>
                <div class="price">$2.3355</div>
            </div>
        </div>
    </section>

    <script>
        async function fetchPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
                const data = await response.json();

                // Update BTC
                document.getElementById('btc-price').innerText = '$' + data.bitcoin.usd.toLocaleString();
                const btcChange = data.bitcoin.usd_24h_change.toFixed(2);
                document.getElementById('btc-change').innerText = (btcChange > 0 ? '+' : '') + btcChange + '%';
                document.getElementById('btc-change').className = 'change ' + (btcChange > 0 ? 'up' : 'down');

                // Update ETH
                document.getElementById('eth-price').innerText = '$' + data.ethereum.usd.toLocaleString();
                const ethChange = data.ethereum.usd_24h_change.toFixed(2);
                document.getElementById('eth-change').innerText = (ethChange > 0 ? '+' : '') + ethChange + '%';
                document.getElementById('eth-change').className = 'change ' + (ethChange > 0 ? 'up' : 'down');

            } catch (error) {
                console.error('Error fetching live data:', error);
            }
        }

        // Fetch immediately and then every 30 seconds
        fetchPrices();
        setInterval(fetchPrices, 30000);
    </script>
</body>
</html>
