<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WillCoin Capital - Login</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #161a1e; padding: 30px; border-radius: 15px; border: 1px solid #2b3139; text-align: center; }
        input { padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #474d57; background: #1e2329; color: white; width: 200px; }
        button { padding: 10px 20px; background: #00d2ff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Enter Username</h2>
        <input type="text" id="nameBox" placeholder="Username">
        <br>
        <button onclick="enterSite()">Login</button>
    </div>

    <script>
        function enterSite() {
            const name = document.getElementById('nameBox').value;
            if(name) {
                localStorage.setItem('myUsername', name);
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
