<!DOCTYPE html>
<html lang="en">

<head>

<title>w illCoin Capital Login</title>

<style>

body{

font-family:Arial;
color:white;

height:100vh;
}

.login-box{
background:#111827;
padding:40px;

input{

padding:12px;

padding:12px;
margin-top:20px;

border-radius:6px;

cursor:pointer;
}

a{
color:#19d3ff;
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>w illCoin Capital</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p style="margin-top:15px;">
Don't have an account?  
<a href="signup.html">Sign up</a>
</p>

</div>
