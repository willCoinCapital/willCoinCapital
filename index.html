<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - WillCoin Capital</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: #161a1e; padding: 2rem; border-radius: 12px; text-align: center; border: 1px solid #2b3139; }
        input { padding: 10px; width: 80%; margin: 10px 0; border-radius: 4px; border: 1px solid #474d57; background: #1e2329; color: white; }
        button { padding: 10px 20px; background: #00d2ff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Sign In</h2>
        <input type="text" id="nameInput" placeholder="Enter Username">
        <br>
        <button onclick="saveAndRedirect()">Login</button>
    </div>

    <script>
        function saveAndRedirect() {
            const name = document.getElementById('nameInput').value;
            if (name) {
                // This saves the name to the browser's memory
                localStorage.setItem('storedUsername', name);
                // Moves to your dashboard file
                window.location.href = "dashboard.html";
            } else {
                alert("Please enter a name");
            }
        }
    </script>
</body>
</html>
