<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Professional Crypto Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#020817] text-white overflow-x-hidden">

    <div class="fixed top-0 right-0 w-[500px] h-[500px] bg-cyan-500/10 blur-[120px] rounded-full -z-10"></div>

    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
        <div class="flex items-center gap-2 text-2xl font-bold">
            <div class="w-8 h-8 bg-cyan-400 rounded flex items-center justify-center text-black italic font-black">W</div>
            <span>WCC</span>
        </div>
        <div class="hidden md:flex gap-8 text-gray-400 text-sm font-medium">
            <a href="#" class="hover:text-cyan-400 transition">Markets</a>
            <a href="#" class="hover:text-cyan-400 transition">Features</a>
            <a href="#" class="hover:text-cyan-400 transition">Bonus</a>
        </div>
        <div class="flex gap-4">
            <button class="px-5 py-2 text-sm font-semibold border border-gray-800 rounded-lg">LOGIN</button>
            <button class="px-5 py-2 text-sm font-bold bg-cyan-400 text-black rounded-lg uppercase">Sign Up</button>
        </div>
    </nav>

    <div class="ticker-wrap border-y border-white/5 bg-white/5 py-3">
        <div class="ticker-move" id="ticker-content">
            <span class="text-gray-500">Connecting to live market feeds...</span>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-8 py-16 grid lg:grid-cols-2 gap-12 items-center">
        <div>
            <h1 class="text-6xl font-black leading-tight mb-6 tracking-tighter">
                Maximize Your <br> Crypto Potential <br>
                <span class="text-cyan-400 font-italic">willCoinCapital.</span>
            </h1>
            <p class="text-gray-400 text-lg mb-8">Secure. Transparent. Performance-driven trading.</p>
            <button class="px-10 py-5 bg-cyan-400 text-black font-black rounded-xl hover:scale-105 transition uppercase">Start Trading</button>
        </div>

        <div class="glass-card p-10 rounded-3xl relative">
            <h2 class="text-3xl font-black italic uppercase tracking-tighter">Exclusive 50%</h2>
            <h2 class="text-3xl font-black italic text-cyan-400 uppercase tracking-tighter mb-8">Deposit Bonus</h2>
            
            <div class="space-y-6">
                <label class="text-[10px] text-gray-500 font-black uppercase tracking-widest block">Deposit Amount ($)</label>
                <input type="number" id="depositInput" value="1000" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-2xl font-bold outline-none focus:border-cyan-400">
                <input type="range" id="depositSlider" min="100" max="10000" step="100" value="1000" class="w-full accent-cyan-400">
            </div>

            <div class="grid grid-cols-3 gap-4 mt-10 pt-8 border-t border-white/5">
                <div><p class="text-[10px] text-gray-500 font-bold uppercase">Invest</p><p class="text-xl font-black" id="displayInvest">$1,000</p></div>
                <div class="text-center"><p class="text-[10px] text-cyan-400 font-bold uppercase">Bonus</p><p class="text-xl font-black text-cyan-400" id="displayBonus">$500</p></div>
                <div class="text-right"><p class="text-[10px] text-gray-500 font-bold uppercase">Total</p><p class="text-xl font-black" id="displayTotal">$1,500</p></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
