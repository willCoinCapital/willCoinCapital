<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin Capital | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CORE RESET & BASE STYLES */
        body { 
            background: #000; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* GLASSMORPHISM & NEO-BRUTALIST UI */
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        /* HEADER SECTION */
        .header-section { margin-top: 40px; text-align: center; flex-shrink: 0; } 

        /* WORKFLOW - The New Info Boxes Area */
        .workflow-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 0 24px; }
        .workflow-content { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; animation: fadeIn 1s ease-out; }
        
        .info-box {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .info-box:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(34, 211, 238, 0.3);
            transform: translateY(-2px);
        }

        .step-num-badge {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            color: #22d3ee;
            box-shadow: inset 0 0 10px rgba(34, 211, 238, 0.05);
        }

        /* AUTH CONTAINER - Fixed at bottom */
        .auth-container { margin-bottom: 40px; padding: 0 24px; flex-shrink: 0; } 

        /* UTILITY ANIMATIONS */
        .status-dot { width: 6px; height: 6px; background: #22d3ee; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; box-shadow: 0 0 10px #22d3ee; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* NOTIFICATIONS */
        #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; }
        .toast { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-left: 4px solid #22d3ee; padding: 16px 20px; border-radius: 18px; display: flex; align-items: center; gap: 12px; animation: slideDown 0.4s forwards; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div id="notification-container"></div>

    <div class="header-section">
        <h1 class="font-black text-3xl tracking-tighter uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
        <p id="formTitle" class="text-gray-500 text-[10px] font-black uppercase tracking-[0.2em] mt-2">
            <span class="status-dot"></span>Secure Member Login
        </p>
    </div>

    <div class="workflow-container">
        <div class="workflow-content">
            <div class="info-box glass">
                <div class="step-num-badge">01</div>
                <div class="text-left">
                    <h3 class="text-cyan-400 font-black text-[11px] uppercase tracking-widest">Deposit</h3>
                    <p class="text-gray-400 text-[10px] leading-tight mt-1">Fund your secure wallet via BTC to initialize the pipeline.</p>
                </div>
            </div>

            <div class="info-box glass">
                <div class="step-num-badge">02</div>
                <div class="text-left">
                    <h3 class="text-cyan-400 font-black text-[11px] uppercase tracking-widest">Stake</h3>
                    <p class="text-gray-400 text-[10px] leading-tight mt-1">Choose your cycle amount using the precision slider.</p>
                </div>
            </div>

            <div class="info-box glass">
                <div class="step-num-badge">03</div>
                <div class="text-left">
                    <h3 class="text-cyan-400 font-black text-[11px] uppercase tracking-widest">Yield</h3>
                    <p class="text-gray-400 text-[10px] leading-tight mt-1">Smart contracts distribute 50% yield over 7 days.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="auth-container w-full max-w-sm mx-auto">
        <div class="glass rounded-[40px] p-8 space-y-4">
            <input type="email" id="email" placeholder="EMAIL ADDRESS" autocomplete="email" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 outline-none font-bold text-xs tracking-widest uppercase text-white placeholder:text-white/20">
            <input type="password" id="password" placeholder="PASSWORD" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 outline-none font-bold text-xs tracking-widest uppercase text-white placeholder:text-white/20">
            
            <div id="bonusTag" class="hidden text-center bg-cyan-400/10 border border-cyan-400/20 py-2 rounded-xl">
                <p class="text-[9px] font-black text-cyan-400 uppercase tracking-widest">$100 Sign-up Bonus Applied</p>
            </div>

            <button id="mainBtn" onclick="handleAuth()" class="w-full py-6 bg-cyan-400 text-black rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white transition-colors duration-300 active:scale-95">Login</button>
            
            <button id="toggleBtn" onclick="toggleMode()" class="w-full py-2 text-gray-500 font-black uppercase text-[9px] tracking-widest">Create New Account</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let isLoginMode = true;

        auth.onAuthStateChanged(user => {
            if (user) window.location.href = "dashboard.html";
        });

        function notify(message) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.innerHTML = `<p class="text-[11px] font-black uppercase tracking-widest text-white">${message}</p>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        }

        function toggleMode() { 
            isLoginMode = !isLoginMode; 
            const formTitle = document.getElementById('formTitle');
            const mainBtn = document.getElementById('mainBtn');
            const toggleBtn = document.getElementById('toggleBtn');
            const bonusTag = document.getElementById('bonusTag');

            if (isLoginMode) {
                formTitle.innerHTML = '<span class="status-dot"></span>Secure Member Login';
                mainBtn.innerText = "Login";
                toggleBtn.innerText = "Create New Account";
                bonusTag.classList.add('hidden');
            } else {
                formTitle.innerHTML = '<span class="status-dot"></span>Create Account';
                mainBtn.innerText = "Sign Up";
                toggleBtn.innerText = "Already have an account? Login";
                bonusTag.classList.remove('hidden');
            }
        }

        async function handleAuth() {
            const emailInput = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!emailInput || !password) return notify("Fill all fields");
            try {
                if (isLoginMode) { 
                    await auth.signInWithEmailAndPassword(emailInput, password); 
                } else { 
                    if(password.length < 6) return notify("Password min 6 chars"); 
                    await auth.createUserWithEmailAndPassword(emailInput, password); 
                }
            } catch (error) { 
                notify(error.message); 
            }
        }
    </script>
</body>
</html>
