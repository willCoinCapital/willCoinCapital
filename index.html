<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WillCoin Capital | Live Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-yellow: #f5d448; --dark: #0f1111; --glass: rgba(15, 17, 17, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--brand-yellow); font-family: 'Inter', sans-serif; color: #1a1a1a; }

        /* --- Nav & Dashboard State --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 6%; }
        .logo { font-family: 'Archivo Black', sans-serif; font-size: 1.2rem; }
        .user-profile { display: none; align-items: center; gap: 10px; font-weight: 800; }
        .user-profile span { background: #000; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }

        /* --- Hero --- */
        .hero { display: flex; flex-wrap: wrap; padding: 40px 6%; align-items: center; gap: 40px; }
        .hero-text h1 { font-family: 'Archivo Black', sans-serif; font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1; margin: 20px 0; }

        /* --- Live Modals --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-black { background: #000; color: #fff; width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        
        /* --- Market Stats --- */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px 6%; }
        .coin-card { background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.5); }
        .price { font-family: 'Archivo Black', sans-serif; font-size: 1.8rem; }
        .up { color: #15803d; } .down { color: #b91c1c; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🏢 WILLCOIN CAPITAL</div>
        <div class="nav-auth" id="loggedOutUI">
            <button onclick="openModal('login')" style="background:none; border:none; font-weight:700; cursor:pointer; margin-right:15px;">Log In</button>
            <button onclick="openModal('signup')" style="background:#fff; border:1px solid #ddd; padding:10px 20px; border-radius:10px; font-weight:700; cursor:pointer;">Sign Up</button>
        </div>
        <div class="user-profile" id="loggedInUI">
            <span id="userNameDisplay">Investor</span>
            <button onclick="logout()" style="font-size:0.7rem; cursor:pointer;">Logout</button>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Expert Portfolio Management.</h1>
            <p>Join 10,000+ investors using WillCoin for institutional growth.</p>
            <button class="btn-black" style="width:auto; padding:18px 40px; margin-top:20px;" onclick="openModal('signup')">OPEN ACCOUNT</button>
        </div>
        <div style="flex:1; min-width:350px;">
            <div style="background:var(--glass); padding:20px; border-radius:30px; height:300px;">
                <iframe src="https://s.tradingview.com/widgetembed/?symbol=BITSTAMP%3ABTCUSD&interval=D&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
            </div>
        </div>
    </section>

    <div class="market-grid">
        <div class="coin-card">
            <b>Bitcoin BTC</b>
            <div class="price" id="btc-p">Loading...</div>
            <span id="btc-c">--</span>
        </div>
        <div class="coin-card">
            <b>Ethereum ETH</b>
            <div class="price" id="eth-p">Loading...</div>
            <span id="eth-c">--</span>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <h2 id="modalTitle">Sign Up</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-black" id="authBtn" onclick="handleAuth()">Submit</button>
            <p id="authError" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
            <span onclick="closeModal()" style="display:block; margin-top:15px; font-size:0.8rem; cursor:pointer; opacity:0.6;">Cancel</span>
        </div>
    </div>

    <script type="module">
        // --- NOTE: You would paste your Firebase Config here ---
        // For now, I've added a simulation so the UI works immediately!

        window.openModal = function(type) {
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = type === 'login' ? 'Welcome Back' : 'Join WillCoin';
            document.getElementById('authBtn').innerText = type === 'login' ? 'Secure Login' : 'Create My Account';
        }

        window.closeModal = function() {
            document.getElementById('authModal').style.display = 'none';
        }

        window.handleAuth = function() {
            const email = document.getElementById('email').value;
            if(!email.includes('@')) {
                document.getElementById('authError').innerText = "Please enter a valid email.";
                return;
            }
            // Simulation of Login
            localStorage.setItem('user', email);
            checkUser();
            closeModal();
        }

        window.logout = function() {
            localStorage.removeItem('user');
            checkUser();
        }

        function checkUser() {
            const user = localStorage.getItem('user');
            if(user) {
                document.getElementById('loggedOutUI').style.display = 'none';
                document.getElementById('loggedInUI').style.display = 'flex';
                document.getElementById('userNameDisplay').innerText = user.split('@')[0].toUpperCase();
            } else {
                document.getElementById('loggedOutUI').style.display = 'block';
                document.getElementById('loggedInUI').style.display = 'none';
            }
        }

        // Live Prices
        async function getLive() {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
            const data = await res.json();
            document.getElementById('btc-p').innerText = '$' + data.bitcoin.usd.toLocaleString();
            document.getElementById('btc-c').innerText = data.bitcoin.usd_24h_change.toFixed(2) + '%';
            document.getElementById('btc-c').className = data.bitcoin.usd_24h_change > 0 ? 'up' : 'down';
            
            document.getElementById('eth-p').innerText = '$' + data.ethereum.usd.toLocaleString();
            document.getElementById('eth-c').innerText = data.ethereum.usd_24h_change.toFixed(2) + '%';
            document.getElementById('eth-c').className = data.ethereum.usd_24h_change > 0 ? 'up' : 'down';
        }

        checkUser();
        getLive();
        setInterval(getLive, 30000);
    </script>
</body>
</html>
