<body class="p-6 pb-32">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();
        
        let currentBalance = 0; 
        const MS_PER_DAY = 86400000;
        let userHistory = []; 
        let btcPrice = 65000;

        // AUTH & INITIALIZATION
        auth.onAuthStateChanged(async (user) => {
            if (!user) { 
                window.location.href = "index.html"; 
                return; 
            }

            // SECURITY: BLOCK UNVERIFIED USERS
            if (!user.emailVerified) {
                await auth.signOut();
                window.location.href = "index.html";
                return;
            }

            // CHECK/GRANT SIGN-UP BONUS
            await handleUserInitialization(user);

            // START DATA SYNC
            fetchBTCPrice();
            setupRealtimeListener(user.uid);
        });

        async function handleUserInitialization(user) {
            const userRef = db.collection("users").doc(user.uid);
            const doc = await userRef.get();
            
            if (!doc.exists) {
                // First time login after verification - Grant $100
                await userRef.set({
                    email: user.email,
                    balance: 100.00,
                    history: [{ 
                        type: "Sign-up Bonus", 
                        amount: 100.00, 
                        id: "WC-BONUS-" + Math.random().toString(36).substr(2, 4).toUpperCase(), 
                        date: "MAR 2026", 
                        status: "Successful" 
                    }],
                    activeCycle: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                notify("Gateway Verified: $100.00 Credited");
            }
        }

        function setupRealtimeListener(uid) {
            db.collection("users").doc(uid).onSnapshot(doc => {
                const data = doc.data();
                if(!data) return;

                // Update Balance UI
                currentBalance = data.balance || 0;
                document.getElementById("balanceDisplay").innerText = "$" + currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                updateBTCValueDisplay();

                // Update History List
                userHistory = data.history || [];
                renderHistoryUI();

                // Check Investment Status
                checkActiveInvestment(data);
                
                // Update Slider/Button state
                updateInvest(document.getElementById('manualInvest').value || 500);
            });
        }

        function renderHistoryUI() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = [...userHistory].reverse().slice(0, 10).map((item, idx) => {
                const actualIdx = userHistory.length - 1 - idx;
                const isGold = item.type.includes("Cycle Active");
                const isPending = (item.status && item.status.includes('Verifying'));
                
                return `
                    <div onclick="viewHistoryDetail(${actualIdx})" class="flex justify-between items-start cursor-pointer active:opacity-50">
                        <div>
                            <p class="text-white font-bold text-[13px] mb-1">${item.type}</p>
                            <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">${item.id} • ${item.status}</p>
                        </div>
                        <p class="${isGold ? 'text-gold' : (isPending ? 'text-orange-400' : 'text-green-400')} font-black text-sm">
                            $${item.amount.toLocaleString()}
                        </p>
                    </div>`;
            }).join('') || '<p class="text-gray-500 text-[10px] font-black uppercase">No transactions yet</p>';
        }

        // BTC & CONVERSION LOGIC
        async function fetchBTCPrice() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const data = await res.json();
                btcPrice = data.bitcoin.usd;
                updateBTCValueDisplay();
            } catch(e) { console.log("Price fetch failed"); }
        }

        function updateBTCValueDisplay() {
            const val = currentBalance / btcPrice;
            document.getElementById('btcValueDisplay').innerText = val.toFixed(8) + " BTC";
        }

        // INVESTMENT LOGIC
        function checkActiveInvestment(data) {
            const card = document.getElementById('activeInvestmentCard');
            if (!data.activeCycle) { 
                card.classList.add('hidden'); 
                return; 
            }
            
            card.classList.remove('hidden');
            const now = Date.now();
            const elapsed = now - data.activeCycle.startTime;
            const totalDuration = 7 * MS_PER_DAY;
            const timeLeft = Math.max(0, totalDuration - elapsed);
            
            const h = Math.floor(timeLeft / 3600000);
            const m = Math.floor((timeLeft % 3600000) / 60000);
            
            // Update Card
            document.getElementById('cardCountdown').innerText = timeLeft <= 0 ? "Complete" : `${h}h ${m}m left`;
            document.getElementById('activeCardAmt').innerText = "$" + data.activeCycle.amount.toLocaleString();
            
            const pct = Math.min(100, (elapsed / totalDuration) * 100);
            document.getElementById('cardProgressBar').style.width = pct + "%";
            
            // Update Details View (if visible)
            document.getElementById('activeStakedAmt').innerText = "$" + data.activeCycle.amount.toLocaleString();
            document.getElementById('journeyProgressBar').style.width = pct + "%";
            document.getElementById('journeyCountdown').innerText = timeLeft <= 0 ? "FINISHED" : `${h}h ${m}m REMAINING`;
            
            // Build 7-day schedule
            const dailyYield = (data.activeCycle.amount * 0.50) / 7;
            let rows = '';
            for(let i=1; i<=7; i++) {
                const passed = elapsed >= (i * MS_PER_DAY);
                const current = !passed && elapsed >= ((i-1) * MS_PER_DAY);
                rows += `
                    <div class="flex justify-between items-center py-4 border-b border-white/5">
                        <span class="text-[10px] font-black text-gray-500 uppercase">Day 0${i}</span>
                        <span class="font-black text-white text-xs">+$${dailyYield.toFixed(2)}</span>
                        <span class="status-pill ${passed || current ? 'status-active' : 'status-waiting'}">
                            ${passed ? 'Earned' : (current ? 'Active' : 'Waiting')}
                        </span>
                    </div>`;
            }
            document.getElementById('scheduleContainer').innerHTML = rows;
        }

        function updateInvest(val) {
            const num = parseFloat(val) || 0;
            document.getElementById('investSlider').value = num;
            document.getElementById('manualInvest').value = num;
            const btn = document.getElementById('startBtn');
            
            const canInvest = (num >= 500 && currentBalance >= num);
            btn.className = canInvest 
                ? "w-full py-6 bg-white text-black rounded-[24px] font-black uppercase text-xs tracking-widest active:scale-95 transition-all" 
                : "w-full py-6 rounded-[24px] font-black uppercase text-xs tracking-widest btn-locked";
        }

        async function processInvestment() {
            const amt = parseFloat(document.getElementById('manualInvest').value);
            const btn = document.getElementById('startBtn');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            try {
                const userRef = db.collection("users").doc(auth.currentUser.uid);
                await userRef.update({ 
                    balance: firebase.firestore.FieldValue.increment(-amt),
                    activeCycle: { amount: amt, startTime: Date.now() },
                    history: firebase.firestore.FieldValue.arrayUnion({
                        type: "7-Day Cycle Active", 
                        amount: amt, 
                        id: "WC-INV-" + Math.random().toString(36).substr(2, 4).toUpperCase(), 
                        date: "MAR 2026", 
                        status: "Successful"
                    })
                });
                notify("Investment Successful");
            } catch(e) { 
                notify("Error processing investment"); 
            } finally {
                btn.innerText = "Start 7-Day Cycle";
                btn.disabled = false;
            }
        }

        // UI HELPERS
        function notify(msg) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.innerHTML = `<p class="text-[11px] font-black uppercase tracking-widest text-white">${msg}</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showInvestmentPageFromCard() { document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('investmentDetailsView').classList.remove('hidden'); }
        function showDashboard() { document.getElementById('investmentDetailsView').classList.add('hidden'); document.getElementById('dashboardView').classList.remove('hidden'); }
        function handleLogout() { auth.signOut().then(() => { location.href = "index.html"; }); }
        function copyBTC() { navigator.clipboard.writeText("Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28"); notify("COPIED"); }
        
        async function handleWithdrawal() {
            const wallet = document.getElementById('drawWallet').value;
            const amt = parseFloat(document.getElementById('drawAmount').value);
            if(!wallet || isNaN(amt) || amt > currentBalance) return notify("Check details/balance");
            try {
                const userRef = db.collection("users").doc(auth.currentUser.uid);
                await userRef.update({
                    balance: firebase.firestore.FieldValue.increment(-amt),
                    history: firebase.firestore.FieldValue.arrayUnion({
                        type: "Withdrawal Pending",
                        amount: amt,
                        id: "WC-WTH-" + Math.random().toString(36).substr(2, 4).toUpperCase(),
                        date: "MAR 2026",
                        status: "Verifying"
                    })
                });
                closeModal('withdrawModal'); 
                notify("Withdrawal Requested");
            } catch (e) { notify("Error requesting withdrawal"); }
        }

        async function handleDepositSubmit() {
            const amtInput = document.getElementById('depositInputAmt');
            const amt = parseFloat(amtInput.value);
            if(isNaN(amt) || amt <= 0) return notify("Enter valid amount");
            try {
                const userRef = db.collection("users").doc(auth.currentUser.uid);
                await userRef.update({
                    history: firebase.firestore.FieldValue.arrayUnion({
                        type: "Deposit Pending", 
                        amount: amt, 
                        id: "WC-DEP-" + Math.random().toString(36).substr(2, 4).toUpperCase(), 
                        date: "MAR 2026", 
                        status: "Verifying"
                    })
                });
                amtInput.value = ""; 
                closeModal('depositModal'); 
                notify("Deposit recorded");
            } catch (e) { notify("Submission Error"); }
        }

        function viewHistoryDetail(index) {
            const item = userHistory[index];
            if(!item) return;
            const content = document.getElementById('historyDetailContent');
            const isGold = item.type.includes("Cycle Active");
            const isPending = (item.status && item.status.includes('Verifying'));
            content.innerHTML = `
                <div class="bg-white/5 p-5 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Type</p><p class="text-white font-black">${item.type}</p></div>
                <div class="bg-white/5 p-5 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Amount</p><p class="text-white font-black">$${item.amount.toLocaleString()}</p></div>
                <div class="bg-white/5 p-5 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Status</p><p class="${isGold ? 'text-gold' : (isPending ? 'text-orange-400' : 'text-green-400')} font-black uppercase text-xs">${item.status}</p></div>`;
            openModal('historyDetailModal');
        }
    </script>
</body>
</html>
