<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <style>
        body { background-color: #0b0e11; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .terminal-header { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid #1e2329; 
            border-radius: 15px; 
            padding: 15px; 
            text-align: center;
            margin-bottom: 20px;
        }
        .status-text { color: #00d2ff; font-weight: bold; text-transform: uppercase; }
        .card { background: #161a1e; border-radius: 20px; padding: 30px; margin-bottom: 15px; border: 1px solid #2b3139; }
        .label { color: #848e9c; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; }
        .value { font-size: 32px; font-weight: bold; }
        .bonus-value { color: #00d2ff; }
        .status-awaiting { color: #f6465d; font-weight: bold; }
    </style>
</head>
<body>

    <div class="terminal-header">
        TERMINAL SYNCED: <span id="welcome-msg" class="status-text">WELCOME BACK</span>
    </div>

    <div class="card">
        <div class="label">Total Portfolio</div>
        <div class="value">$0.00</div>
    </div>

    <div class="card">
        <div class="label">Unlocked Bonus</div>
        <div class="value bonus-value">$0.00</div>
    </div>

    <div class="card">
        <div class="label">Cycle Status</div>
        <div class="status-awaiting">AWAITING ACTIVATION</div>
    </div>

    <script>
        // This runs automatically when the page loads
        window.onload = function() {
            const name = localStorage.getItem('storedUsername');
            const displayElement = document.getElementById('welcome-msg');
            
            if (name) {
                displayElement.innerText = `WELCOME BACK, ${name.toUpperCase()}`;
            } else {
                // If they didn't log in, send them back to the login page
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
