<style>
    /* Fixed styles for the breakdown view */
    .investment-breakdown { display: none; margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem; }
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; font-size: 11px; }
    .status-pill { padding: 4px 10px; border-radius: 99px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-waiting { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.3); }
    .status-active { background: rgba(34, 211, 238, 0.1); color: #22d3ee; border: 1px solid rgba(34, 211, 238, 0.3); }
</style>

<div class="glass rounded-[40px] p-8 mb-6">
    <h3 class="font-black text-[10px] uppercase tracking-widest text-white/30 mb-8">Invest</h3>
    
    <div id="activeTracker" class="hidden mb-8 p-6 rounded-[32px] bg-white/5 border border-white/10">
        <div class="flex justify-between items-center mb-6">
            <span class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-400">Live Cycle</p>
            </span>
            <p id="cycleCountdown" class="text-[11px] font-mono font-bold text-white/60">0d 0h 0m</p>
        </div>
        
        <div class="mb-6">
            <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1">Staked Principal</p>
            <h4 id="activePrincipal" class="text-4xl font-black text-white">$0.00</h4>
        </div>
        
        <button onclick="toggleBreakdown()" class="w-full py-4 bg-cyan-400/10 hover:bg-cyan-400/20 border border-cyan-400/20 rounded-2xl text-[10px] font-black uppercase tracking-[0.15em] text-cyan-400 transition-all">
            View 7-Day Yield Breakdown
        </button>

        <div id="yieldBreakdown" class="investment-breakdown fade-in">
            <div id="breakdownRows" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="investmentControls">
        <input type="range" id="investSlider" min="500" max="20000" step="500" value="500" oninput="updateInvest(this.value)">
        <div class="bg-black/30 border border-white/10 rounded-[28px] p-8 text-center mb-6">
            <p class="text-[9px] font-black text-gray-500 uppercase mb-2 tracking-widest">Manual Amount</p>
            <input type="number" id="manualInvest" value="500" class="bg-transparent w-full text-5xl font-black outline-none text-white text-center" oninput="updateInvest(this.value)">
        </div>
        <button id="startBtn" onclick="processInvestment()" class="w-full py-6 rounded-[24px] font-black uppercase text-xs tracking-widest transition-all btn-locked">Start 7-Day Cycle</button>
    </div>
</div>

<script>
    // In your auth.onAuthStateChanged listener:
    db.collection("users").doc(user.uid).onSnapshot(doc => {
        const data = doc.data();
        if(!data) return;

        // Logic to toggle between Active Tracker and Controls
        const tracker = document.getElementById('activeTracker');
        const controls = document.getElementById('investmentControls');

        if(data.activeCycle && data.activeCycle.startTime) {
            tracker.classList.remove('hidden');
            controls.classList.add('hidden');
            updateCycleDisplay(data.activeCycle);
        } else {
            tracker.classList.add('hidden');
            controls.classList.remove('hidden');
        }
    });

    function updateCycleDisplay(cycle) {
        document.getElementById('activePrincipal').innerText = "$" + cycle.amount.toLocaleString();
        
        const startTime = cycle.startTime;
        const now = Date.now();
        const cycleLength = 7 * 24 * 60 * 60 * 1000;
        const elapsed = now - startTime;
        
        // Update Countdown
        const remaining = Math.max(0, cycleLength - elapsed);
        const days = Math.floor(remaining / (24 * 60 * 60 * 1000));
        const hours = Math.floor((remaining % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
        const mins = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
        document.getElementById('cycleCountdown').innerText = `${days}d ${hours}h ${mins}m left`;

        // Generate Breakdown Rows
        const rowsContainer = document.getElementById('breakdownRows');
        let html = '';
        const totalYieldPercent = 0.50; // 50%
        const dailyYield = (cycle.amount * totalYieldPercent) / 7;

        for(let i = 1; i <= 7; i++) {
            const dayMs = i * 24 * 60 * 60 * 1000;
            const isPassed = elapsed >= dayMs;
            const isCurrent = !isPassed && elapsed >= (i-1) * 24 * 60 * 60 * 1000;
            
            const statusLabel = isPassed ? "Earned" : (isCurrent ? "Active" : "Waiting");
            const statusClass = (isPassed || isCurrent) ? "status-active" : "status-waiting";

            html += `
                <div class="breakdown-row">
                    <span class="text-white/40 font-bold tracking-widest">DAY 0${i}</span>
                    <span class="font-black text-white">+$${dailyYield.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                    <span class="status-pill ${statusClass}">${statusLabel}</span>
                </div>
            `;
        }
        rowsContainer.innerHTML = html;
    }

    function toggleBreakdown() {
        const bd = document.getElementById('yieldBreakdown');
        bd.style.display = (bd.style.display === 'block') ? 'none' : 'block';
    }
</script>
