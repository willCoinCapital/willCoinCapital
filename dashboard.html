<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.08);}
    </style>
</head>
<body class="p-6">
    <nav class="flex justify-between items-center mb-8">
        <h1 class="font-black text-xl">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
        <button onclick="logoutUser()" class="text-xs text-gray-400">Logout</button>
    </nav>

    <h1 id="greetingText" class="text-3xl font-bold mb-1">...</h1>
    <p class="text-gray-500 text-xs mb-6">Here is your portfolio overview with the latest market data.</p>

    <div class="glass rounded-3xl p-6 mb-6">
        <p class="text-gray-400 text-xs">TOTAL BALANCE</p>
        <h2 id="balanceDisplay" class="text-4xl font-bold mt-2">$0.00</h2>
        <div class="flex gap-2 mt-4">
            <button onclick="addDeposit()" class="flex-1 bg-cyan-400 text-black py-2 rounded-xl font-bold">Deposit</button>
            <button class="flex-1 bg-gray-800 py-2 rounded-xl">Withdraw</button>
        </div>
    </div>

    <div class="glass rounded-3xl p-5">
        <h3 class="font-bold mb-3">Transaction History</h3>
        <table class="w-full text-sm">
            <tbody id="txHistory" class="space-y-2"></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b",
            measurementId: "G-4VEL5JXYYL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Greeting Logic: Matches the key set in index.html
                const mode = localStorage.getItem("willcoinAuthMode");
                const greeting = document.getElementById("greetingText");
                
                if (mode === "signup") {
                    greeting.innerText = "Hello Welcome";
                } else {
                    greeting.innerText = "Welcome Back, Investor";
                }

                // Live Balance Check from Firestore
                const userDoc = await db.collection("users").doc(user.uid).get();
                if (userDoc.exists) {
                    const data = userDoc.data();
                    document.getElementById("balanceDisplay").innerText = "$" + data.balance.toFixed(2);
                    
                    // Permanent History Row for the $100 bonus
                    document.getElementById("txHistory").innerHTML = `
                        <tr class="border-b border-white/5">
                            <td class="py-3 text-gray-400">Mar 2026</td>
                            <td class="font-semibold text-white">Signup Bonus</td>
                            <td class="text-right text-cyan-400">+$100.00</td>
                        </tr>
                    `;
                }
            } else {
                // Redirect to login if no active user
                window.location.href = "index.html";
            }
        });

        async function addDeposit() {
            const amt = prompt("Enter Deposit Amount ($):");
            if (amt && !isNaN(amt) && parseFloat(amt) > 0) {
                const user = auth.currentUser;
                try {
                    await db.collection("users").doc(user.uid).update({
                        balance: firebase.firestore.FieldValue.increment(parseFloat(amt))
                    });
                    // Refresh UI to show new balance
                    location.reload();
                } catch (err) {
                    alert("Deposit failed. Please try again.");
                }
            }
        }

        function logoutUser() {
            // Clear the greeting mode so it resets for the next user
            localStorage.removeItem("willcoinAuthMode");
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
